name: New Contributor Message

on:
  pull_request_target:

jobs:
  build:
    name: Hello new contributor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: ""  # Unused
          pr-message: |
            Hey, thank you for opening your Pull Request !
            Newline test

            Make sure test `abc`
